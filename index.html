<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>HTML Share Viewer</title>
        <style>
            :root {
                color-scheme: light dark;
            }
            body {
                margin: 0;
                font:
                    14px/1.4 system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    Arial,
                    sans-serif;
            }
            main {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 24px;
                box-sizing: border-box;
            }
            .drop {
                border: 2px dashed
                    color-mix(in oklab, CanvasText 25%, transparent);
                border-radius: 16px;
                padding: 48px 32px;
                width: min(480px, 100%);
                display: grid;
                place-items: center;
                background: color-mix(in oklab, Canvas 95%, transparent);
                cursor: pointer;
                text-align: center;
            }
            .drop.dragover {
                border-color: color-mix(in oklab, CanvasText 55%, transparent);
                background: color-mix(in oklab, Canvas 85%, transparent);
            }
            .drop p {
                margin: 6px 0;
                opacity: 0.9;
            }
            button {
                font: inherit;
                margin-top: 20px;
                padding: 10px 20px;
                border-radius: 10px;
                border: 1px solid
                    color-mix(in oklab, CanvasText 20%, transparent);
                background: color-mix(in oklab, Canvas 90%, transparent);
                cursor: pointer;
            }
            button:active {
                transform: translateY(1px);
            }
            iframe {
                position: fixed;
                inset: 0;
                width: 100%;
                height: 100%;
                border: 0;
                display: none;
            }
            .show-iframe main {
                display: none;
            }
            .show-iframe iframe {
                display: block;
            }
            /* Modal */
            .modal-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.45);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 100;
            }
            .modal-backdrop.hidden {
                display: none;
            }
            .modal {
                background: Canvas;
                border-radius: 16px;
                padding: 28px 32px;
                width: min(440px, 90vw);
                box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            }
            .modal h2 {
                margin: 0 0 20px;
                font-size: 18px;
            }
            .check {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                margin-bottom: 14px;
            }
            .dot {
                flex-shrink: 0;
                width: 18px;
                height: 18px;
                border-radius: 50%;
                margin-top: 2px;
            }
            .dot.green  { background: #22c55e; }
            .dot.yellow { background: #f59e0b; }
            .dot.red    { background: #ef4444; }
            .check-label {
                font-weight: 600;
                margin-bottom: 2px;
            }
            .check-desc {
                opacity: 0.75;
                font-size: 13px;
            }
            .modal-actions {
                margin-top: 24px;
                display: flex;
                gap: 10px;
                justify-content: flex-end;
            }
            .modal-actions button {
                margin-top: 0;
            }
            .btn-primary {
                background: #3b82f6;
                color: #fff;
                border-color: #2563eb;
            }
        </style>
    </head>
    <body>
        <main>
            <div
                id="drop"
                class="drop"
                tabindex="0"
                role="button"
                aria-label="Drop an HTML file here or choose a file"
            >
                <p><strong>Drag &amp; drop an .html file</strong></p>
                <p>or click the button below</p>
            </div>
            <button id="btnPick">Choose file</button>
            <input
                id="fileInput"
                type="file"
                accept=".html,.htm,text/html"
                hidden
            />
        </main>

        <!-- Size check modal -->
        <div id="modalBackdrop" class="modal-backdrop hidden">
            <div class="modal">
                <h2 id="modalTitle">Your link is ready</h2>
                <div id="modalChecks"></div>
                <div class="modal-actions">
                    <button id="btnModalBack">Go back</button>
                    <button id="btnModalView" class="btn-primary">Copy link &amp; view</button>
                </div>
            </div>
        </div>

        <iframe
            id="viewer"
            sandbox="allow-scripts allow-forms allow-modals allow-popups"
            referrerpolicy="no-referrer"
        ></iframe>

        <script>
            // ---------- Base64URL helpers ----------
            function bytesToBase64(bytes) {
                let binary = "";
                const chunkSize = 0x8000;
                for (let i = 0; i < bytes.length; i += chunkSize) {
                    binary += String.fromCharCode(
                        ...bytes.subarray(i, i + chunkSize),
                    );
                }
                return btoa(binary);
            }

            function base64UrlEncode(bytes) {
                return bytesToBase64(bytes)
                    .replace(/\+/g, "-")
                    .replace(/\//g, "_")
                    .replace(/=+$/g, "");
            }

            function base64UrlDecodeToBytes(b64url) {
                let b64 = b64url.replace(/-/g, "+").replace(/_/g, "/");
                const pad = (4 - (b64.length % 4)) % 4;
                b64 += "=".repeat(pad);
                const binary = atob(b64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++)
                    bytes[i] = binary.charCodeAt(i);
                return bytes;
            }

            // ---------- gzip helpers ----------
            const gzipSupported =
                "CompressionStream" in window &&
                "DecompressionStream" in window;

            async function gzipBytes(bytes) {
                const cs = new CompressionStream("gzip");
                const stream = new Blob([bytes]).stream().pipeThrough(cs);
                return new Uint8Array(await new Response(stream).arrayBuffer());
            }

            async function gunzipBytes(bytes) {
                const ds = new DecompressionStream("gzip");
                const stream = new Blob([bytes]).stream().pipeThrough(ds);
                return new Uint8Array(await new Response(stream).arrayBuffer());
            }

            // ---------- App ----------
            const dec = new TextDecoder("utf-8", { fatal: false });
            const viewer = document.getElementById("viewer");

            // Thresholds (fragment chars)
            const LIMITS = [
                {
                    label: "Works everywhere",
                    desc: "Safe to share in emails, Slack, Teams, and most messaging apps.",
                    green: 0,
                    yellow: 4_000,
                    red: 8_000,
                },
                {
                    label: "Works in most browsers",
                    desc: "Browsers can open this link directly from the address bar.",
                    green: 0,
                    yellow: 500_000,
                    red: 2_000_000,
                },
            ];

            function sizeColor(len, limit) {
                if (len < limit.yellow) return "green";
                if (len < limit.red)   return "yellow";
                return "red";
            }

            function buildChecks(fragLen) {
                const kb = (fragLen / 1024).toFixed(1);
                const checks = document.getElementById("modalChecks");
                checks.innerHTML = "";

                // Overall size pill
                const sizeLine = document.createElement("p");
                sizeLine.style.cssText = "margin:0 0 16px; opacity:0.7; font-size:13px;";
                sizeLine.textContent = `Link size: ${kb} KB`;
                checks.appendChild(sizeLine);

                for (const limit of LIMITS) {
                    const color = sizeColor(fragLen, limit);
                    const messages = {
                        green:  { label: limit.label, desc: limit.desc },
                        yellow: {
                            label: limit.label + " — might have issues",
                            desc: limit.label === "Works everywhere"
                                ? "Some messaging apps may truncate or reject this link. Try it before relying on it."
                                : "Very large — some older browsers may struggle.",
                        },
                        red: {
                            label: limit.label + " — likely won't work",
                            desc: limit.label === "Works everywhere"
                                ? "Too large for most messaging apps. Share the link by other means (e.g. a file host)."
                                : "Exceeds browser URL limits. The link may not open.",
                        },
                    }[color];

                    const row = document.createElement("div");
                    row.className = "check";
                    row.innerHTML = `
                        <div class="dot ${color}"></div>
                        <div>
                            <div class="check-label">${messages.label}</div>
                            <div class="check-desc">${messages.desc}</div>
                        </div>`;
                    checks.appendChild(row);
                }
            }

            let pendingFragment = null;

            async function handleFile(file) {
                if (!file) return;
                const bytes = new Uint8Array(await file.arrayBuffer());
                let payloadBytes = bytes;
                let prefix = "r.";
                if (gzipSupported) {
                    try {
                        const gz = await gzipBytes(bytes);
                        if (gz.length + 32 < bytes.length) {
                            payloadBytes = gz;
                            prefix = "g.";
                        }
                    } catch (_) {}
                }
                pendingFragment = prefix + base64UrlEncode(payloadBytes);
                buildChecks(pendingFragment.length);
                document.getElementById("modalBackdrop").classList.remove("hidden");
            }

            async function renderFromHash() {
                const hash = location.hash.startsWith("#")
                    ? location.hash.slice(1)
                    : "";
                if (!hash) {
                    document.body.classList.remove("show-iframe");
                    viewer.removeAttribute("srcdoc");
                    return;
                }
                const prefix = hash.startsWith("g.") || hash.startsWith("r.")
                    ? hash.slice(0, 2)
                    : "r.";
                const b64url = prefix ? hash.slice(2) : hash;
                try {
                    let bytes = base64UrlDecodeToBytes(b64url);
                    if (prefix === "g.") bytes = await gunzipBytes(bytes);
                    viewer.srcdoc = dec.decode(bytes);
                    document.body.classList.add("show-iframe");
                } catch (e) {
                    document.body.classList.remove("show-iframe");
                    viewer.removeAttribute("srcdoc");
                    console.error(e);
                }
            }

            document.getElementById("btnModalView").addEventListener("click", async () => {
                const url = location.href.split("#")[0] + "#" + pendingFragment;
                try {
                    await navigator.clipboard.writeText(url);
                } catch (_) {
                    // Fallback for non-HTTPS contexts
                    const ta = document.createElement("textarea");
                    ta.value = url;
                    ta.style.position = "fixed";
                    ta.style.opacity = "0";
                    document.body.appendChild(ta);
                    ta.focus();
                    ta.select();
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                }
                document.getElementById("modalBackdrop").classList.add("hidden");
                location.hash = pendingFragment;
            });
            document.getElementById("btnModalBack").addEventListener("click", () => {
                document.getElementById("modalBackdrop").classList.add("hidden");
                pendingFragment = null;
            });

            document.getElementById("btnPick").addEventListener("click", () =>
                document.getElementById("fileInput").click(),
            );
            document.getElementById("fileInput").addEventListener("change", (e) =>
                handleFile(e.target.files[0]),
            );

            const drop = document.getElementById("drop");
            ["dragenter", "dragover"].forEach((evt) =>
                drop.addEventListener(evt, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    drop.classList.add("dragover");
                }),
            );
            ["dragleave", "drop"].forEach((evt) =>
                drop.addEventListener(evt, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    drop.classList.remove("dragover");
                }),
            );
            drop.addEventListener("drop", (e) =>
                handleFile(e.dataTransfer.files[0]),
            );

            window.addEventListener("hashchange", renderFromHash);
            renderFromHash();
        </script>
    </body>
</html>
